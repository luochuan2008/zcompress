name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            zig-url: https://ziglang.org/builds/zig-macos-aarch64-0.16.0-dev.3153+d6f43caad.tar.xz
            zig-dir: zig-macos-aarch64-0.16.0-dev.3153+d6f43caad
          - os: macos-13
            target: macos-x64
            zig-url: https://ziglang.org/builds/zig-macos-x86_64-0.16.0-dev.3153+d6f43caad.tar.xz
            zig-dir: zig-macos-x86_64-0.16.0-dev.3153+d6f43caad
          - os: ubuntu-latest
            target: linux-x64
            zig-url: https://ziglang.org/builds/zig-linux-x86_64-0.16.0-dev.3153+d6f43caad.tar.xz
            zig-dir: zig-linux-x86_64-0.16.0-dev.3153+d6f43caad
          - os: windows-latest
            target: windows-x64
            zig-url: https://ziglang.org/builds/zig-windows-x86_64-0.16.0-dev.3153+d6f43caad.zip
            zig-dir: zig-windows-x86_64-0.16.0-dev.3153+d6f43caad
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            curl -L "${{ matrix.zig-url }}" -o zig.zip
            7z x zig.zip -ozig-tmp
            mv zig-tmp/* zig
            echo "$PWD/zig" >> $GITHUB_PATH
          else
            curl -L "${{ matrix.zig-url }}" -o zig.tar.xz
            tar xf zig.tar.xz
            mv "${{ matrix.zig-dir }}" zig
            echo "$PWD/zig" >> $GITHUB_PATH
          fi

      - name: Verify Zig
        run: zig version

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev libbrotli-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd brotli

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: choco install zstandard brotli -y

      - name: Build release
        run: zig build -Doptimize=ReleaseFast

      - name: Rename binary
        shell: bash
        run: |
          BIN="zcompress-${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="${BIN}.exe"
            cp zig-out/bin/zcompress.exe "$BIN"
          else
            cp zig-out/bin/zcompress "$BIN"
          fi
          echo "BINARY=$BIN" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: ${{ env.BINARY }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          cd plugins/vite
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
