name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev

      - name: Install zstd + brotli (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev libbrotli-dev

      - name: Install zstd + brotli (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd brotli

      - name: Install zstd + brotli (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install zstandard brotli -y
          echo "LIB_DIR=C:/ProgramData/chocolatey/lib/zstandard/build/native/bin" >> $env:GITHUB_ENV

      - name: Run tests
        run: zig build test --summary all

      - name: Build release
        run: zig build -Doptimize=ReleaseFast

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev
      - name: Check formatting
        run: zig fmt --check src/ tests/ build.zig
